<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Random Picker | Valorant 随机抽取器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
        .glow-bar { height: 6px; }
        .result-enter {
            animation: slideUpFade 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spin-anim {
            animation: spinBlur 0.15s ease-in-out;
        }
        @keyframes spinBlur {
            0% { filter: blur(0px); transform: scale(1); }
            50% { filter: blur(2px); transform: scale(1.05); }
            100% { filter: blur(0px); transform: scale(1); }
        }
        .role-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .role-duelist { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .role-initiator { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
        .role-controller { background: rgba(168, 85, 247, 0.2); color: #d8b4fe; border: 1px solid rgba(168, 85, 247, 0.3); }
        .role-sentinel { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
        .lang-btn {
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            background: #ef4444;
            color: white;
        }
        .lang-btn:not(.active) {
            background: transparent;
            color: #9ca3af;
            border: 1px solid #4b5563;
        }
        .lang-btn:not(.active):hover {
            color: white;
            border-color: #9ca3af;
        }
    </style>
</head>
<body class="min-h-screen text-white py-8">
    <div class="max-w-6xl mx-auto px-6">
        <!-- Language Toggle -->
        <div class="flex justify-end mb-4">
            <div class="flex gap-2 bg-zinc-800/50 rounded-full p-1">
                <button onclick="setLang('zh')" id="btn-zh" class="lang-btn active px-4 py-1.5 rounded-full text-sm font-bold cursor-pointer">中文</button>
                <button onclick="setLang('en')" id="btn-en" class="lang-btn px-4 py-1.5 rounded-full text-sm font-bold cursor-pointer">EN</button>
            </div>
        </div>

        <h1 class="text-7xl font-black text-center text-red-500 mb-2">VALORANT</h1>
        <p class="text-center text-3xl mb-12" data-i18n="subtitle">随机抽取器</p>

        <div class="grid md:grid-cols-2 gap-10">
            <!-- 英雄 -->
            <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-red-500/30">
                <div class="glow-bar" style="background: linear-gradient(90deg, #ef4444, #f59e0b);"></div>
                <div class="p-8">
                    <h2 class="text-4xl font-bold text-center mb-8" data-i18n="agentTitle">🧍 随机英雄</h2>
                    <div id="agent-display" class="min-h-[420px] flex items-center justify-center bg-black/40 rounded-2xl">
                        <div id="agent-placeholder" class="text-center">
                            <div class="text-8xl mb-6">❓</div>
                            <p class="text-gray-400" data-i18n="ready">准备好了吗？</p>
                        </div>
                        <div id="agent-result" class="hidden text-center result-enter">
                            <img id="agent-image" class="mx-auto rounded-2xl mb-6" style="width:260px;height:260px;object-fit:contain" alt="">
                            <h3 id="agent-name" class="text-5xl font-black"></h3>
                            <div id="agent-role" class="role-badge"></div>
                        </div>
                    </div>
                    <button onclick="randomAgent()" class="w-full mt-8 bg-red-600 hover:bg-red-700 transition-colors py-7 rounded-2xl text-xl font-bold cursor-pointer" data-i18n="pickAgent">抽取英雄</button>
                </div>
            </div>

            <!-- 武器 -->
            <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-amber-500/30">
                <div class="glow-bar" style="background: linear-gradient(90deg, #f59e0b, #fbbf24);"></div>
                <div class="p-8">
                    <h2 class="text-4xl font-bold text-center mb-8" data-i18n="weaponTitle">🔫 随机武器</h2>
                    <div id="weapon-display" class="min-h-[420px] flex items-center justify-center bg-black/40 rounded-2xl">
                        <div id="weapon-placeholder" class="text-center">
                            <div class="text-8xl mb-6">🎯</div>
                            <p class="text-gray-400" data-i18n="ready">准备好了吗？</p>
                        </div>
                        <div id="weapon-result" class="hidden text-center result-enter">
                            <img id="weapon-image" class="mx-auto rounded-2xl mb-6" style="width:260px;height:260px;object-fit:contain" alt="">
                            <h3 id="weapon-name" class="text-5xl font-black"></h3>
                            <p id="weapon-type" class="text-amber-400 text-2xl mt-2"></p>
                        </div>
                    </div>
                    <button onclick="randomWeapon()" class="w-full mt-8 bg-amber-600 hover:bg-amber-700 transition-colors py-7 rounded-2xl text-xl font-bold cursor-pointer" data-i18n="pickWeapon">抽取武器</button>
                </div>
            </div>
        </div>

        <div class="text-center mt-12">
            <button onclick="randomBoth()" 
                    class="bg-white text-black px-20 py-8 rounded-3xl text-3xl font-black hover:bg-yellow-300 transition-all cursor-pointer"
                    data-i18n="pickBoth">
                ⚡ 同时抽取
            </button>
        </div>
        
        <div class="text-center mt-8 text-gray-500 text-sm">
            <p data-i18n="footer">包含全部 29 位英雄 & 19 种武器</p>
        </div>
    </div>

    <script>
        // ========== BILINGUAL DATA ==========
        const i18n = {
            zh: {
                subtitle: "随机抽取器",
                agentTitle: "🧍 随机英雄",
                weaponTitle: "🔫 随机武器",
                ready: "准备好了吗？",
                pickAgent: "抽取英雄",
                pickWeapon: "抽取武器",
                pickBoth: "⚡ 同时抽取",
                footer: "包含全部 29 位英雄 & 19 种武器"
            },
            en: {
                subtitle: "Random Picker",
                agentTitle: "🧍 Random Agent",
                weaponTitle: "🔫 Random Weapon",
                ready: "Ready?",
                pickAgent: "Pick Agent",
                pickWeapon: "Pick Weapon",
                pickBoth: "⚡ Pick Both",
                footer: "29 Agents & 19 Weapons"
            }
        };

        let currentLang = 'zh';

        function setLang(lang) {
            currentLang = lang;
            
            // Update button states
            document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Update all text elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            
            // Update displayed role/type if result is visible
            const agentResult = document.getElementById('agent-result');
            if (!agentResult.classList.contains('hidden')) {
                const roleEl = document.getElementById('agent-role');
                const currentRoleText = roleEl.textContent;
                const rolePairs = {"决斗": "Duelist", "先锋": "Initiator", "控场": "Controller", "哨位": "Sentinel"};
                for (const [zh, en] of Object.entries(rolePairs)) {
                    if (currentRoleText === zh || currentRoleText === en) {
                        roleEl.textContent = lang === 'zh' ? zh : en;
                        break;
                    }
                }
            }
            
            const weaponResult = document.getElementById('weapon-result');
            if (!weaponResult.classList.contains('hidden')) {
                const typeEl = document.getElementById('weapon-type');
                const currentTypeText = typeEl.textContent;
                const typePairs = {
                    "步枪": "Rifle", "狙击枪": "Sniper", "机枪": "Machine Gun",
                    "霰弹枪": "Shotgun", "冲锋枪": "SMG", "手枪": "Pistol"
                };
                for (const [zh, en] of Object.entries(typePairs)) {
                    if (currentTypeText === zh || currentTypeText === en) {
                        typeEl.textContent = lang === 'zh' ? zh : en;
                        break;
                    }
                }
            }
        }

        // ========== AGENTS & WEAPONS DATA ==========
        const agents = [
            // Duelist - 8
            { name: "Jett", nameZh: "捷风", nameEn: "Jett", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Jett.png" },
            { name: "Phoenix", nameZh: "不死鸟", nameEn: "Phoenix", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Phoenix.png" },
            { name: "Reyna", nameZh: "芮娜", nameEn: "Reyna", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Reyna.png" },
            { name: "Raze", nameZh: "雷兹", nameEn: "Raze", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Raze.png" },
            { name: "Yoru", nameZh: "夜露", nameEn: "Yoru", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Yoru.png" },
            { name: "Neon", nameZh: "霓虹", nameEn: "Neon", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Neon.png" },
            { name: "Iso", nameZh: "壹决", nameEn: "Iso", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Iso.png" },
            { name: "Waylay", nameZh: "维赖", nameEn: "Waylay", roleZh: "决斗", roleEn: "Duelist", roleClass: "role-duelist", img: "agents/Waylay.png" },
            
            // Initiator - 7
            { name: "Sova", nameZh: "猎枭", nameEn: "Sova", roleZh: "先锋", roleEn: "Initiator", roleClass: "role-initiator", img: "agents/Sova.png" },
            { name: "Breach", nameZh: "铁臂", nameEn: "Breach", roleZh: "先锋", roleEn: "Initiator", roleClass: "role-initiator", img: "agents/Breach.png" },
            { name: "Skye", nameZh: "斯凯", nameEn: "Skye", roleZh: "先锋", roleEn: "Initiator", roleClass: "role-initiator", img: "agents/Skye.png" },
            { name: "KAY/O", nameZh: "KAY/O", nameEn: "KAY/O", roleZh: "先锋", roleEn: "Initiator", roleClass: "role-initiator", img: "agents/KAYO.png" },
            { name: "Fade", nameZh: "黑梦", nameEn: "Fade", roleZh: "先锋", roleEn: "Initiator", roleClass: "role-initiator", img: "agents/Fade.png" },
            { name: "Gekko", nameZh: "盖可", nameEn: "Gekko", roleZh: "先锋", roleEn: "Initiator", roleClass: "role-initiator", img: "agents/Gekko.png" },
            { name: "Tejo", nameZh: "钛狐", nameEn: "Tejo", roleZh: "先锋", roleEn: "Initiator", roleClass: "role-initiator", img: "agents/Tejo.png" },
            
            // Controller - 7
            { name: "Brimstone", nameZh: "炼狱", nameEn: "Brimstone", roleZh: "控场", roleEn: "Controller", roleClass: "role-controller", img: "agents/Brimstone.png" },
            { name: "Viper", nameZh: "蝰蛇", nameEn: "Viper", roleZh: "控场", roleEn: "Controller", roleClass: "role-controller", img: "agents/Viper.png" },
            { name: "Omen", nameZh: "幽影", nameEn: "Omen", roleZh: "控场", roleEn: "Controller", roleClass: "role-controller", img: "agents/Omen.png" },
            { name: "Astra", nameZh: "星礈", nameEn: "Astra", roleZh: "控场", roleEn: "Controller", roleClass: "role-controller", img: "agents/Astra.png" },
            { name: "Harbor", nameZh: "海神", nameEn: "Harbor", roleZh: "控场", roleEn: "Controller", roleClass: "role-controller", img: "agents/Harbor.png" },
            { name: "Clove", nameZh: "暮蝶", nameEn: "Clove", roleZh: "控场", roleEn: "Controller", roleClass: "role-controller", img: "agents/Clove.png" },
            { name: "Miks", nameZh: "米克丝", nameEn: "Miks", roleZh: "控场", roleEn: "Controller", roleClass: "role-controller", img: "agents/Miks.png" },
            
            // Sentinel - 7
            { name: "Sage", nameZh: "贤者", nameEn: "Sage", roleZh: "哨位", roleEn: "Sentinel", roleClass: "role-sentinel", img: "agents/Sage.png" },
            { name: "Killjoy", nameZh: "奇乐", nameEn: "Killjoy", roleZh: "哨位", roleEn: "Sentinel", roleClass: "role-sentinel", img: "agents/Killjoy.png" },
            { name: "Cypher", nameZh: "零", nameEn: "Cypher", roleZh: "哨位", roleEn: "Sentinel", roleClass: "role-sentinel", img: "agents/Cypher.png" },
            { name: "Chamber", nameZh: "尚勃勒", nameEn: "Chamber", roleZh: "哨位", roleEn: "Sentinel", roleClass: "role-sentinel", img: "agents/Chamber.png" },
            { name: "Deadlock", nameZh: "钢锁", nameEn: "Deadlock", roleZh: "哨位", roleEn: "Sentinel", roleClass: "role-sentinel", img: "agents/Deadlock.png" },
            { name: "Vyse", nameZh: "维斯", nameEn: "Vyse", roleZh: "哨位", roleEn: "Sentinel", roleClass: "role-sentinel", img: "agents/Vyse.png" },
            { name: "Veto", nameZh: "维托", nameEn: "Veto", roleZh: "哨位", roleEn: "Sentinel", roleClass: "role-sentinel", img: "agents/Veto.png" }
        ];

        const weapons = [
            // Rifles
            { name: "Vandal", typeZh: "步枪", typeEn: "Rifle", img: "weapons/Vandal.png" },
            { name: "Phantom", typeZh: "步枪", typeEn: "Rifle", img: "weapons/Phantom.png" },
            { name: "Bulldog", typeZh: "步枪", typeEn: "Rifle", img: "weapons/Bulldog.png" },
            { name: "Guardian", typeZh: "步枪", typeEn: "Rifle", img: "weapons/Guardian.png" },
            
            // Snipers
            { name: "Operator", typeZh: "狙击枪", typeEn: "Sniper", img: "weapons/Operator.png" },
            { name: "Marshal", typeZh: "狙击枪", typeEn: "Sniper", img: "weapons/Marshal.png" },
            { name: "Outlaw", typeZh: "狙击枪", typeEn: "Sniper", img: "weapons/Outlaw.png" },
            
            // Machine Guns
            { name: "Odin", typeZh: "机枪", typeEn: "Machine Gun", img: "weapons/Odin.png" },
            { name: "Ares", typeZh: "机枪", typeEn: "Machine Gun", img: "weapons/Ares.png" },
            
            // Shotguns
            { name: "Judge", typeZh: "霰弹枪", typeEn: "Shotgun", img: "weapons/Judge.png" },
            { name: "Bucky", typeZh: "霰弹枪", typeEn: "Shotgun", img: "weapons/Bucky.png" },
            
            // SMGs
            { name: "Spectre", typeZh: "冲锋枪", typeEn: "SMG", img: "weapons/Spectre.png" },
            { name: "Stinger", typeZh: "冲锋枪", typeEn: "SMG", img: "weapons/Stinger.png" },
            
            // Pistols
            { name: "Classic", typeZh: "手枪", typeEn: "Pistol", img: "weapons/Classic.png" },
            { name: "Ghost", typeZh: "手枪", typeEn: "Pistol", img: "weapons/Ghost.png" },
            { name: "Sheriff", typeZh: "手枪", typeEn: "Pistol", img: "weapons/Sheriff.png" },
            { name: "Frenzy", typeZh: "手枪", typeEn: "Pistol", img: "weapons/Frenzy.png" },
            { name: "Shorty", typeZh: "手枪", typeEn: "Pistol", img: "weapons/Shorty.png" },
            { name: "Bandit", typeZh: "手枪", typeEn: "Pistol", img: "weapons/Bandit.png" }
        ];

        function spin(displayId, resultId, imgId, nameId, typeId, list, isAgent) {
            const display = document.getElementById(displayId);
            const placeholder = display.querySelector('[id*="placeholder"]');
            const result = document.getElementById(resultId);
            const img = document.getElementById(imgId);
            const name = document.getElementById(nameId);
            const type = document.getElementById(typeId);
            
            placeholder.classList.add('hidden');
            result.classList.add('hidden');
            result.classList.remove('result-enter');

            let i = 0;
            const interval = setInterval(() => {
                const item = list[Math.floor(Math.random() * list.length)];
                img.src = item.img;
                img.classList.add('spin-anim');
                setTimeout(() => img.classList.remove('spin-anim'), 150);
                i++;
                if (i > 12) {
                    clearInterval(interval);
                    const final = list[Math.floor(Math.random() * list.length)];
                    img.src = final.img;
                    name.textContent = currentLang === 'zh' ? final.nameZh : final.nameEn;
                    if (isAgent) {
                        type.textContent = currentLang === 'zh' ? final.roleZh : final.roleEn;
                        type.className = 'role-badge ' + final.roleClass;
                    } else {
                        type.textContent = currentLang === 'zh' ? final.typeZh : final.typeEn;
                    }
                    result.classList.remove('hidden');
                    void result.offsetWidth;
                    result.classList.add('result-enter');
                }
            }, 100);
        }

        function randomAgent() {
            spin('agent-display', 'agent-result', 'agent-image', 'agent-name', 'agent-role', agents, true);
        }

        function randomWeapon() {
            spin('weapon-display', 'weapon-result', 'weapon-image', 'weapon-name', 'weapon-type', weapons, false);
        }

        function randomBoth() {
            randomAgent();
            setTimeout(() => {
                randomWeapon();
            }, 700);
        }
    </script>
</body>
</html>
