<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Random Picker | Valorant 随机抽取器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
        .glow-bar { height: 6px; }

        /* ========== SLOT MACHINE REEL ========== */
        .reel-container {
            width: 260px;
            height: 260px;
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            border: 2px solid #334155;
        }
        .reel-container::before,
        .reel-container::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 10;
            pointer-events: none;
        }
        .reel-container::before {
            top: 0;
            background: linear-gradient(180deg, rgba(15,23,42,0.9) 0%, transparent 100%);
        }
        .reel-container::after {
            bottom: 0;
            background: linear-gradient(0deg, rgba(15,23,42,0.9) 0%, transparent 100%);
        }
        .reel-strip {
            position: absolute;
            width: 100%;
        }
        .reel-item {
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reel-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: brightness(0.5) blur(1px);
        }

        /* ========== FLIP CARD ========== */
        .flip-card {
            perspective: 1000px;
            width: 260px;
            height: 260px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flip-card-front {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid #334155;
        }
        .flip-card-back {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid #ef4444;
            transform: rotateY(180deg);
            flex-direction: column;
            padding: 10px;
        }
        .flip-card-back.weapon-back {
            border-color: #f59e0b;
        }

        /* ========== RESULT ANIMATIONS ========== */
        .result-pop {
            animation: resultPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes resultPop {
            0% { opacity: 0; transform: scale(0.3) translateY(30px); }
            50% { transform: scale(1.1) translateY(-5px); }
            70% { transform: scale(0.95) translateY(2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .glow-pulse {
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6), 0 0 60px rgba(239, 68, 68, 0.2); }
        }
        .glow-pulse-amber {
            animation: glowPulseAmber 2s ease-in-out infinite;
        }
        @keyframes glowPulseAmber {
            0%, 100% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
            50% { box-shadow: 0 0 40px rgba(245, 158, 11, 0.6), 0 0 60px rgba(245, 158, 11, 0.2); }
        }

        /* ========== PARTICLE EFFECT ========== */
        .particles {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            pointer-events: none;
            z-index: 20;
        }
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
        }
        .particle.active {
            animation: particleBurst 0.8s ease-out forwards;
        }
        @keyframes particleBurst {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* ========== ROLE BADGES ========== */
        .role-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .role-duelist { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .role-initiator { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
        .role-controller { background: rgba(168, 85, 247, 0.2); color: #d8b4fe; border: 1px solid rgba(168, 85, 247, 0.3); }
        .role-sentinel { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }

        /* ========== LANG TOGGLE ========== */
        .lang-btn {
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            background: #ef4444;
            color: white;
        }
        .lang-btn:not(.active) {
            background: transparent;
            color: #9ca3af;
            border: 1px solid #4b5563;
        }
        .lang-btn:not(.active):hover {
            color: white;
            border-color: #9ca3af;
        }

        /* ========== SHINE EFFECT ========== */
        .shine-effect {
            position: relative;
            overflow: hidden;
        }
        .shine-effect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255,255,255,0.1) 50%,
                transparent 60%
            );
            transform: translateX(-100%);
        }
        .shine-effect.active::after {
            animation: shine 0.8s ease-in-out;
        }
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ========== SOUND TOGGLE ========== */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1e293b;
            border: 2px solid #475569;
            color: #94a3b8;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .sound-toggle:hover {
            border-color: #ef4444;
            color: #ef4444;
        }
        .sound-toggle.muted {
            color: #475569;
        }
    </style>
</head>
<body class="min-h-screen text-white py-8">
    <div class="max-w-6xl mx-auto px-6">

            <!-- 武器 -->

    <!-- Sound Toggle Button -->
    <button onclick="toggleSound()" id="sound-btn" class="sound-toggle" title="开关音效">
        <i class="fas fa-volume-up" id="sound-icon"></i>

    <script>
        // ========== AUDIO ENGINE ==========
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('sound-btn');
            const icon = document.getElementById('sound-icon');
            if (soundEnabled) {
                btn.classList.remove('muted');
                icon.className = 'fas fa-volume-up';
            } else {
                btn.classList.add('muted');
                icon.className = 'fas fa-volume-mute';
            }
        }

        // Play a tick sound (for slot machine spinning)
        function playTick() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Play a flip sound
        function playFlip() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Play a win/reveal sound
        function playWin() {
            if (!soundEnabled || !audioCtx) return;
            // Chord: C-E-G
            const freqs = [523.25, 659.25, 783.99];
            freqs.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.05);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.05);
                gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + i * 0.05 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.05 + 0.5);
                osc.start(audioCtx.currentTime + i * 0.05);
                osc.stop(audioCtx.currentTime + i * 0.05 + 0.5);
            });
        }

        // Play a click sound
        function playClick() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.08);
        }

        // ========== BILINGUAL DATA ==========
        const i18n = {
            zh: {
                subtitle: "随机抽取器",
                agentTitle: "🧍 随机英雄",
                weaponTitle: "🔫 随机武器",

        let currentLang = 'zh';

        function setLang(lang) {
            currentLang = lang;

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });

            const agentResult = document.getElementById('agent-text-result');
            if (agentResult.style.opacity === '1') {
                const roleEl = document.getElementById('agent-role');

                    if (currentText === zh || currentText === en) {

                        break;
                    }

        // ========== PARTICLE SYSTEM ==========
        function createParticles(containerId, color) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = color;
                const angle = (Math.PI * 2 * i) / 20;
                const dist = 80 + Math.random() * 60;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.animationDelay = (Math.random() * 0.3) + 's';
                container.appendChild(p);
            }
            setTimeout(() => {
                container.querySelectorAll('.particle').forEach(p => p.classList.add('active'));
            }, 50);
        }

        // ========== SLOT MACHINE + FLIP ANIMATION ==========
        function spin(displayId, placeholderId, reelId, reelStripId, resultId, flipCardId, textResultId, shineId, imgId, nameId, typeId, list, isAgent, particleId, particleColor) {
            initAudio();
            playClick();

            const placeholder = document.getElementById(placeholderId);
            const reel = document.getElementById(reelId);
            const reelStrip = document.getElementById(reelStripId);
            const result = document.getElementById(resultId);
            const flipCard = document.getElementById(flipCardId);
            const textResult = document.getElementById(textResultId);
            const shine = document.getElementById(shineId);
            const img = document.getElementById(imgId);
            const name = document.getElementById(nameId);
            const type = document.getElementById(typeId);

            placeholder.classList.add('hidden');
            result.classList.add('hidden');
            flipCard.classList.remove('flipped');
            textResult.style.opacity = '0';
            textResult.classList.remove('result-pop');
            shine.classList.remove('active');

            reel.classList.remove('hidden');

            let stripHTML = '';
            for (let i = 0; i < 20; i++) {
                const item = list[Math.floor(Math.random() * list.length)];
                stripHTML += `<div class="reel-item"><img src="${item.img}" alt=""></div>`;
            }
            reelStrip.innerHTML = stripHTML;
            reelStrip.style.transform = 'translateY(0)';

            const speed = 30;
            const totalScroll = 260 * 15;
            let currentScroll = 0;
            let tickCounter = 0;

            const animateReel = () => {
                currentScroll += speed;
                reelStrip.style.transform = `translateY(-${currentScroll % (260 * 20)}px)`;

                // Play tick sound every few frames
                tickCounter++;
                if (tickCounter % 3 === 0) {
                    playTick();
                }

                if (currentScroll < totalScroll) {
                    requestAnimationFrame(animateReel);
                } else {
                    reel.classList.add('hidden');
                    result.classList.remove('hidden');

                    const final = list[Math.floor(Math.random() * list.length)];
                    img.src = final.img;

                    setTimeout(() => {
                        playFlip();
                        flipCard.classList.add('flipped');
                        shine.classList.add('active');
                        createParticles(particleId, particleColor);

                        setTimeout(() => {
                            playWin();
                            if (isAgent) {
                                name.textContent = currentLang === 'zh' ? final.nameZh : final.nameEn;
                                type.textContent = currentLang === 'zh' ? final.roleZh : final.roleEn;
                                type.className = 'role-badge ' + final.roleClass;
                            } else {
                                const weaponName = currentLang === 'zh' ? final.nameZh : final.nameEn;
                                const weaponType = currentLang === 'zh' ? final.typeZh : final.typeEn;
                                name.textContent = weaponName;
                                type.textContent = weaponType;
                            }
                            textResult.style.opacity = '1';
                            textResult.classList.add('result-pop');
                        }, 400);
                    }, 100);
                }
            };

            requestAnimationFrame(animateReel);
        }

        function randomAgent() {
            spin(
                'agent-display', 'agent-placeholder', 'agent-reel', 'agent-reel-strip',
                'agent-result', 'agent-flip-card', 'agent-text-result', 'agent-shine',
                'agent-image', 'agent-name', 'agent-role',
                agents, true, 'agent-particles', '#ef4444'
            );
        }

            spin(
                'weapon-display', 'weapon-placeholder', 'weapon-reel', 'weapon-reel-strip',
                'weapon-result', 'weapon-flip-card', 'weapon-text-result', 'weapon-shine',
                'weapon-image', 'weapon-name', 'weapon-type',
                weapons, false, 'weapon-particles', '#f59e0b'
            );
        }

        function randomBoth() {
            randomAgent();
            setTimeout(() => {
                randomWeapon();
            }, 800);
        }
